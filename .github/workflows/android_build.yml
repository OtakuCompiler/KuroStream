name: Android Build & Test

# This workflow is a lightweight standalone build that runs on
# workflow_dispatch only.  Full CI (lint + tests + build gate) is handled
# by ci.yml which triggers automatically on push / pull_request.
on:
  workflow_dispatch:

# All Gradle commands run from the Android project subdirectory.
# The monorepo root contains pnpm/Node tooling — do NOT use it for Android.
defaults:
  run:
    working-directory: kuro-stream

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platform-tools
            build-tools;35.0.0
            platforms;android-35
            cmdline-tools;latest
          accept-android-sdk-licenses: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon
        env:
          JAVA_OPTS: -Xmx4g

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Upload Debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.sha }}
          path: kuro-stream/app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: kuro-stream/app/build/reports/tests/testDebugUnitTest/
          retention-days: 7

      # ── Build summary ──────────────────────────────────────────────────────
      - name: Write APK size summary
        if: success()
        run: |
          echo "### Build Output" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          find app/build/outputs/apk/debug -name "*.apk" | sort | while read f; do
            echo "| \`$(basename $f)\` | $(du -sh $f | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          done

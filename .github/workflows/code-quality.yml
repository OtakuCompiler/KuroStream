---
name: Code Quality

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  GRADLE_OPTS: "-Xmx1g -XX:+UseG1GC -Dorg.gradle.parallel=false"
  JAVA_VERSION: "17"

jobs:
  detekt:
    name: Detekt
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - run: chmod +x gradlew

      - run: ./gradlew detekt --no-daemon -q

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detekt
          path: "**/reports/detekt/*.html"
          retention-days: 1
          if-no-files-found: ignore

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - uses: android-actions/setup-android@v3

      - run: chmod +x gradlew

      - run: ./gradlew :app:lintDebug --no-daemon -q

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint
          path: "**/reports/lint-results*.html"
          retention-days: 1
          if-no-files-found: ignore

  spotless:
    name: Spotless
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - run: chmod +x gradlew

      - run: ./gradlew spotlessCheck --no-daemon -q

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [detekt, lint, spotless]
    if: always()
    steps:
      - run: |
          echo "## Code Quality" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Detekt | ${{ needs.detekt.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Spotless | ${{ needs.spotless.result }} |" >> $GITHUB_STEP_SUMMARY

name: Dependency Review

# Scans every PR for newly introduced vulnerable or licence-incompatible
# dependencies before they land on main / develop.
on:
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          # Block PRs that introduce HIGH or CRITICAL CVEs
          fail-on-severity: high
          # Deny licences that are incompatible with a closed-source release
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0
          # Post a summary comment on the PR
          comment-summary-in-pr: always
          # Allow these advisories to be suppressed if they're false-positives
          # allow-ghsas: GHSA-xxxx-xxxx-xxxx

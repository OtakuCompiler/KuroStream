---
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  GRADLE_OPTS: "-Xmx1536m -XX:+UseG1GC -Dorg.gradle.parallel=false"
  JAVA_VERSION: "17"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - uses: android-actions/setup-android@v3

      - run: chmod +x gradlew

      - run: ./gradlew bundleRelease --no-daemon -x lint -x test -x detekt

      - uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 30
          if-no-files-found: ignore

  sign-release:
    name: Sign & Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/

      - uses: r0adkll/sign-android-release@v1
        id: sign
        with:
          releaseDirectory: app/build/outputs/bundle/release/
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: ${{ steps.sign.outputs.signedReleaseFile }}
          releaseNotes: Release ${{ github.ref_name }}

      - uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.sign.outputs.signedReleaseFile }}
          generate_release_notes: true

      - uses: actions/upload-artifact@v4
        with:
          name: signed-aab
          path: ${{ steps.sign.outputs.signedReleaseFile }}
          retention-days: 90

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: sign-release
    if: always()
    steps:
      - uses: 8398a7/action-slack@v3
        if: env.SLACK_WEBHOOK_URL != ''
        with:
          status: ${{ job.status }}
          channel: '#releases'
          text: Release ${{ github.ref_name }} ${{ job.status }}
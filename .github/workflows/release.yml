name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  GRADLE_OPTS: "-Xmx4g -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"
  JAVA_VERSION: "17"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        api-level: [24, 30, 34]
        build-type: [debug, release]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: cmdline-tools;latest
          accept-android-sdk-licenses: true

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android SDK packages
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-${{ matrix.api-level }}" "build-tools;34.0.0" "ndk;26.1.10909125" "cmake;3.22.1"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug
        if: matrix.build-type == 'debug'
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release
        if: matrix.build-type == 'release'
        run: ./gradlew assembleRelease --no-daemon

      - name: Run Unit Tests
        run: ./gradlew test --no-daemon

      - name: Upload Debug APK
        if: matrix.build-type == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-api${{ matrix.api-level }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload Release AAB
        if: matrix.build-type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-api${{ matrix.api-level }}
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 30

  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: build-and-test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: cmdline-tools;latest
          accept-android-sdk-licenses: true

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android SDK packages
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "ndk;26.1.10909125" "cmake;3.22.1"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Macrobenchmarks
        run: ./gradlew :benchmark:connectedBenchmarkAndroidTest --no-daemon

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark/build/outputs/connected_android_test_additional_output/debugAndroidTest/connected/
          retention-days: 30

  accessibility:
    name: Accessibility Audit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: cmdline-tools;latest
          accept-android-sdk-licenses: true

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android SDK packages
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Accessibility Tests
        run: ./gradlew :app:connectedAndroidTest -Pandroid.testInstrumentationRunnerArguments.class=com.kurostream.tv.accessibility.AccessibilityTest --no-daemon

  sign-and-release:
    name: Sign & Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build-and-test, benchmark, accessibility]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: cmdline-tools;latest
          accept-android-sdk-licenses: true

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android SDK packages
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Download Release AAB
        uses: actions/download-artifact@v4
        with:
          name: app-release-api34
          path: app/build/outputs/bundle/release/

      - name: Verify AAB
        run: |
          ls -la app/build/outputs/bundle/release/
          bundletool validate --bundle=app/build/outputs/bundle/release/app-release.aab

      - name: Sign AAB
        id: sign
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/bundle/release/
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: ${{ steps.sign.outputs.signedReleaseFile }}
          releaseNotes: "Release ${{ github.ref_name }} - See RELEASE.md for details"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ steps.sign.outputs.signedReleaseFile }}
            app/build/outputs/bundle/release/app-release.aab
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Upload AAB as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-aab
          path: ${{ steps.sign.outputs.signedReleaseFile }}
          retention-days: 90

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: sign-and-release
    if: always()
    steps:
      - name: Send Slack Notification
        if: env.SLACK_WEBHOOK_URL != ''
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#releases'
          text: "KuroStream ${{ github.ref_name }} release ${{ job.status }}"
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
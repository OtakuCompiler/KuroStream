name: Nightly Build

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2:00 UTC
  workflow_dispatch:
    inputs:
      build-type:
        description: 'Build type'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - debug
          - release
      abi-splits:
        description: 'Build ABI splits'
        required: false
        default: 'true'
        type: boolean

env:
  GRADLE_OPTS: "-Xmx8g -Dorg.gradle.parallel=true -Dorg.gradle.caching=true -Dorg.gradle.configureondemand=true"
  JAVA_VERSION: "17"

jobs:
  build-all-abis:
    name: Build All ABI Splits
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: github.event.inputs.abi-splits == 'true' || github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        abi: [armeabi-v7a, arm64-v8a, x86, x86_64]
        build-type: [debug, release]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          ndk-version: r26c
          cmake-version: 3.22.1
          build-tools-version: 34.0.0

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build ${{ matrix.build-type }} APK for ${{ matrix.abi }}
        run: |
          ./gradlew assemble${{ matrix.build-type == 'debug' && 'Debug' || 'Release' }} \
            -PabiFilter=${{ matrix.abi }} \
            --no-daemon

      - name: Upload ${{ matrix.build-type }} APK (${{ matrix.abi }})
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.build-type }}-${{ matrix.abi }}
          path: app/build/outputs/apk/${{ matrix.build-type }}/*.apk
          retention-days: 7

  build-app-bundle:
    name: Build App Bundle (Universal)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          ndk-version: r26c

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release App Bundle
        run: ./gradlew bundleRelease --no-daemon

      - name: Verify App Bundle
        run: |
          ls -la app/build/outputs/bundle/release/
          bundletool validate --bundle=app/build/outputs/bundle/release/app-release.aab

      - name: Build Debug App Bundle
        run: ./gradlew bundleDebug --no-daemon

      - name: Upload Release App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: app-release-bundle
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 7

      - name: Upload Debug App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-bundle
          path: app/build/outputs/bundle/debug/*.aab
          retention-days: 7

  build-fat-apk:
    name: Build Fat APK (All ABIs)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          ndk-version: r26c

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Fat Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Fat Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Fat Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-fat-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload Fat Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-fat-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7

  instrumentation-tests:
    name: Instrumentation Tests (API ${{ matrix.api-level }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        api-level: [28, 30, 34]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ matrix.api-level }}
          ndk-version: r26c
          cmake-version: 3.22.1

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create AVD
        uses: android-actions/create-avd@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          ndk-version: r26c
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -memory 2048

      - name: Run Instrumentation Tests
        run: ./gradlew connectedDebugAndroidTest --no-daemon

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumentation-test-results-api${{ matrix.api-level }}
          path: '**/build/reports/androidTests/connected/**'
          retention-days: 7

  macrobenchmarks:
    name: Macrobenchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          ndk-version: r26c

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create AVD for Benchmarks
        uses: android-actions/create-avd@v2
        with:
          api-level: 34
          arch: x86_64
          ndk-version: r26c
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -memory 4096

      - name: Run Macrobenchmarks
        run: ./gradlew :benchmark:connectedBenchmarkAndroidTest --no-daemon

      - name: Upload Benchmark Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macrobenchmark-results
          path: benchmark/build/outputs/connected_android_test_additional_output/debugAndroidTest/connected/
          retention-days: 7

  startup-timing:
    name: Startup Timing Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          ndk-version: r26c

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create AVD
        uses: android-actions/create-avd@v2
        with:
          api-level: 34
          arch: x86_64
          ndk-version: r26c
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -memory 4096

      - name: Run Startup Benchmark
        run: ./gradlew :benchmark:connectedBenchmarkAndroidTest -Pandroidx.benchmark.dryRunMode.enable=false --tests "*StartupTiming*" --no-daemon

      - name: Upload Startup Benchmark
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: startup-timing-results
          path: benchmark/build/outputs/connected_android_test_additional_output/debugAndroidTest/connected/
          retention-days: 7

  summary:
    name: Nightly Build Summary
    runs-on: ubuntu-latest
    needs: [build-all-abis, build-app-bundle, build-fat-apk, instrumentation-tests, macrobenchmarks, startup-timing]
    if: always()
    steps:
      - name: Check Build Status
        run: |
          FAILED=0
          for job in build-all-abis build-app-bundle build-fat-apk instrumentation-tests macrobenchmarks startup-timing; do
            RESULT="${{ needs.$job.result }}"
            if [[ "$RESULT" != "success" && "$RESULT" != "skipped" ]]; then
              echo "::error::$job failed with $RESULT"
              FAILED=1
            fi
          done
          if [[ $FAILED -eq 1 ]]; then
            exit 1
          fi

      - name: Create Summary Report
        run: |
          echo "## Nightly Build Summary - $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status | Artifacts |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build All ABIs | ${{ needs.build-all-abis.result }} | [Download](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Build App Bundle | ${{ needs.build-app-bundle.result }} | [Download](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Fat APK | ${{ needs.build-fat-apk.result }} | [Download](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Instrumentation Tests | ${{ needs.instrumentation-tests.result }} | [Download](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Macrobenchmarks | ${{ needs.macrobenchmarks.result }} | [Download](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Startup Timing | ${{ needs.startup-timing.result }} | [Download](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY

      - name: Send Slack Notification
        if: env.SLACK_WEBHOOK_URL != ''
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#nightly-builds'
          text: "KuroStream Nightly Build ${{ job.status }}"
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
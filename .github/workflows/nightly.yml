---
name: Nightly Build

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Xmx1536m -XX:+UseG1GC -Dorg.gradle.parallel=false"
  JAVA_VERSION: "17"

jobs:
  debug:
    name: Debug Build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - uses: android-actions/setup-android@v3

      - run: chmod +x gradlew

      - run: >-
          ./gradlew assembleDebug
          -PabiFilters=arm64-v8a
          --no-daemon
          -x lint
          -x test

      - uses: actions/upload-artifact@v4
        with:
          name: nightly-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 3
          if-no-files-found: ignore

  bundle:
    name: Bundle
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - uses: android-actions/setup-android@v3

      - run: chmod +x gradlew

      - run: ./gradlew bundleRelease --no-daemon -x lint -x test

      - uses: actions/upload-artifact@v4
        with:
          name: nightly-bundle
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 3
          if-no-files-found: ignore

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [debug, bundle]
    if: always()
    steps:
      - run: |
          echo "## Nightly Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Debug | ${{ needs.debug.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bundle | ${{ needs.bundle.result }} |" >> $GITHUB_STEP_SUMMARY

      - uses: 8398a7/action-slack@v3
        if: env.SLACK_WEBHOOK_URL != ''
        with:
          status: ${{ job.status }}
          channel: '#nightly'
          text: Nightly ${{ job.status }}

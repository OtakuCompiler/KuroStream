name: Deploy Preview

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
    types: [opened, synchronize, reopened]

env:
  GRADLE_OPTS: "-Xmx8g -Dorg.gradle.parallel=true -Dorg.gradle.caching=true -Dorg.gradle.configureondemand=true"
  JAVA_VERSION: "17"

jobs:
  build-preview:
    name: Build Preview APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: cmdline-tools;latest
          accept-android-sdk-licenses: true

      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install Android SDK packages
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;26.1.10909125" "cmake;3.22.1"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Run Unit Tests
        run: ./gradlew test --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-preview
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  deploy-firebase-preview:
    name: Deploy to Firebase App Distribution (Preview)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build-preview
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug-preview
          path: app/build/outputs/apk/debug/

      - name: Verify APK
        run: ls -la app/build/outputs/apk/debug/

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_PREVIEW }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: preview
          file: app/build/outputs/apk/debug/app-debug.apk
          releaseNotes: "Preview build from develop branch - ${{ github.sha }}"

  notify-preview:
    name: Notify Preview Deploy
    runs-on: ubuntu-latest
    needs: deploy-firebase-preview
    if: always()
    steps:
      - name: Send Slack Notification
        if: env.SLACK_WEBHOOK_URL != ''
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ needs.deploy-firebase-preview.result }}
          channel: '#preview-deploys'
          text: "KuroStream Preview Deploy ${{ needs.deploy-firebase-preview.result }}"
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

---
name: Deploy Preview

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

env:
  GRADLE_OPTS: "-Xmx1536m -XX:+UseG1GC -Dorg.gradle.parallel=false"
  JAVA_VERSION: "17"

jobs:
  build:
    name: Build Preview
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - uses: android-actions/setup-android@v3

      - run: chmod +x gradlew

      - run: >-
          ./gradlew assembleDebug
          -PabiFilters=arm64-v8a
          --no-daemon
          -x lint
          -x test

      - run: ./gradlew :domain:test --no-daemon -q

      - uses: actions/upload-artifact@v4
        with:
          name: preview
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 1
          if-no-files-found: ignore

      - if: always()
        run: rm -rf build .gradle || true

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    if: github.event_name == 'push'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: preview
          path: app/build/outputs/apk/debug/

      - uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID_PREVIEW }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: preview
          file: app/build/outputs/apk/debug/app-debug.apk
          releaseNotes: Preview - ${{ github.sha }}

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - uses: 8398a7/action-slack@v3
        if: env.SLACK_WEBHOOK_URL != ''
        with:
          status: ${{ needs.deploy.result }}
          channel: '#preview'
          text: Preview ${{ needs.deploy.result }}
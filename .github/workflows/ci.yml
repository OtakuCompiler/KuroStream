name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# All `run` steps execute inside the Android project subdirectory.
# The repo root is a pnpm monorepo; the Gradle project lives in kuro-stream/.
defaults:
  run:
    working-directory: kuro-stream

env:
  JAVA_VERSION: '17'
  JAVA_DIST: 'temurin'
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=false
    -Dorg.gradle.parallel=true
    -Dorg.gradle.workers.max=4
    -Dkotlin.incremental=false

jobs:

  # ── 0. Security: validate the Gradle wrapper binary ─────────────────────────
  validate-wrapper:
    name: Validate Gradle Wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Gradle wrapper checksum
        uses: gradle/actions/wrapper-validation@v3

  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: validate-wrapper
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DIST }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platform-tools
            build-tools;35.0.0
            platforms;android-35
            cmdline-tools;latest
          accept-android-sdk-licenses: true

      - uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run lint (debug variant)
        run: ./gradlew lintDebug --stacktrace

      - name: Annotate PR with lint warnings
        if: failure() && github.event_name == 'pull_request'
        uses: yutailang0119/action-android-lint@v4
        with:
          report-path: kuro-stream/app/build/reports/lint-results-debug.xml
        continue-on-error: true

      - name: Upload lint HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-${{ github.sha }}
          path: kuro-stream/app/build/reports/lint-results-debug.html
          retention-days: 14

  # ── 2. Unit tests (runs in parallel with lint) ───────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: validate-wrapper
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DIST }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platform-tools
            build-tools;35.0.0
            platforms;android-35
            cmdline-tools;latest
          accept-android-sdk-licenses: true

      - uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace --continue

      - name: Publish test results (PR annotation)
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Test Results
          path: kuro-stream/app/build/test-results/testDebugUnitTest/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-xml-${{ github.sha }}
          path: kuro-stream/app/build/test-results/testDebugUnitTest/
          retention-days: 14

      - name: Upload HTML test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-html-${{ github.sha }}
          path: kuro-stream/app/build/reports/tests/testDebugUnitTest/
          retention-days: 14

  # ── 3. Debug build (gate: lint + tests must pass) ────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: [ lint, unit-tests ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DIST }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platform-tools
            build-tools;35.0.0
            platforms;android-35
            cmdline-tools;latest
          accept-android-sdk-licenses: true

      - uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Assemble debug APKs (all ABI splits + universal)
        run: ./gradlew assembleDebug --stacktrace

      - name: Report APK sizes
        run: |
          echo "### Debug APK sizes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          find app/build/outputs/apk/debug -name "*.apk" | sort | while read f; do
            size=$(du -sh "$f" | cut -f1)
            name=$(basename "$f")
            echo "| \`$name\` | $size |" >> $GITHUB_STEP_SUMMARY
          done

      - name: Upload debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: kuro-stream-debug-${{ github.sha }}
          path: kuro-stream/app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # ── 4. Summary (always runs, reports final status) ───────────────────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [ lint, unit-tests, build-debug ]
    if: always()
    defaults:
      run:
        working-directory: .   # summary job has no Gradle work
    steps:
      - name: Write job summary
        run: |
          echo "## CI — \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Debug Build | ${{ needs.build-debug.result }} |" >> $GITHUB_STEP_SUMMARY

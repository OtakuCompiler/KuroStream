---
name: CI - Ultra Optimized

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  GRADLE_OPTS: >-
    -Xmx1536m
    -XX:MaxMetaspaceSize=512m
    -XX:+UseG1GC
    -XX:MaxGCPauseMillis=100
    -Dorg.gradle.parallel=false
    -Dorg.gradle.caching=true
    -Dorg.gradle.daemon=false
  JAVA_VERSION: "17"

jobs:
  kmp-compile:
    name: KMP Compile
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - run: chmod +x gradlew

      - run: >-
          ./gradlew
          :domain:compileKotlinJs
          :core-common:compileKotlinJs
          --no-daemon
          -x test
          -x lint

  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - uses: android-actions/setup-android@v3

      - run: chmod +x gradlew

      - run: ./gradlew spotlessCheck --no-daemon -q

      - run: ./gradlew detekt --no-daemon -q

      - run: ./gradlew :app:lintDebug --no-daemon -q

      - run: ./gradlew :domain:test --no-daemon -q

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: "**/build/reports/**"
          retention-days: 1
          if-no-files-found: ignore

  build-debug:
    name: Build Debug
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [kmp-compile]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - uses: android-actions/setup-android@v3

      - run: chmod +x gradlew

      - run: >-
          ./gradlew assembleDebug
          -PabiFilters=arm64-v8a
          --no-daemon
          -x lint
          -x test

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 3
          if-no-files-found: ignore

      - if: always()
        run: rm -rf build .gradle || true

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [kmp-compile, lint-test, build-debug]
    if: always()
    steps:
      - name: Check job results
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| KMP | ${{ needs.kmp-compile.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build-debug.result }} |" >> $GITHUB_STEP_SUMMARY
          
          # Fail workflow if any job failed
          if [ "${{ needs.kmp-compile.result }}" = "failure" ] || [ "${{ needs.lint-test.result }}" = "failure" ] || [ "${{ needs.build-debug.result }}" = "failure" ]; then
            echo "##[error] One or more jobs failed"
            exit 1
          fi

name: PR Check

on:
  pull_request:
    branches: [ main, develop ]
    types: [ opened, synchronize, reopened ]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: kuro-stream

env:
  JAVA_VERSION: '17'
  JAVA_DIST: 'temurin'
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=false
    -Dorg.gradle.parallel=true
    -Dkotlin.incremental=false
  # APK size budget in MB — PRs above this threshold get a warning comment
  APK_SIZE_BUDGET_MB: 80

jobs:

  # ── 0. Wrapper security check ────────────────────────────────────────────────
  validate-wrapper:
    name: Validate Gradle Wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/actions/wrapper-validation@v3

  # ── 1. Lint + unit tests ─────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    needs: validate-wrapper
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changed-file diffing

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DIST }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platform-tools
            build-tools;35.0.0
            platforms;android-35
            cmdline-tools;latest
          accept-android-sdk-licenses: true

      - uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: true

      - name: Run lint (debug)
        run: ./gradlew lintDebug --stacktrace --continue

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace --continue

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: PR Unit Test Results
          path: kuro-stream/app/build/test-results/testDebugUnitTest/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload lint + test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-reports-${{ github.event.pull_request.number }}-${{ github.sha }}
          path: |
            kuro-stream/app/build/reports/lint-results-debug.html
            kuro-stream/app/build/reports/tests/testDebugUnitTest/
          retention-days: 5

  # ── 2. Debug build + APK size budget ─────────────────────────────────────────
  apk-size-check:
    name: APK Size Check
    runs-on: ubuntu-latest
    needs: validate-wrapper
    permissions:
      pull-requests: write   # to post the size comment

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DIST }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platform-tools
            build-tools;35.0.0
            platforms;android-35
            cmdline-tools;latest
          accept-android-sdk-licenses: true

      - uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: true

      - name: Build debug APKs
        run: ./gradlew assembleDebug --stacktrace

      - name: Measure APK sizes and enforce budget
        id: sizes
        run: |
          BUDGET=${{ env.APK_SIZE_BUDGET_MB }}
          OVER_BUDGET=false
          TABLE="| ABI | Size |\n|-----|------|\n"

          # ABI list matches splits config: armeabi-v7a, arm64-v8a, x86_64, universal
          for ABI in armeabi-v7a arm64-v8a x86_64 universal; do
            APK="app/build/outputs/apk/debug/app-${ABI}-debug.apk"
            [ -f "$APK" ] || continue
            SIZE_HUMAN=$(du -sh "$APK" | cut -f1)
            SIZE_MB=$(du -sm "$APK" | cut -f1)
            TABLE+="| \`${ABI}\` | ${SIZE_HUMAN} |\n"
            if [ "$SIZE_MB" -gt "$BUDGET" ]; then
              OVER_BUDGET=true
              echo "::warning::${ABI} APK (${SIZE_HUMAN}) exceeds ${BUDGET} MB budget"
            fi
          done

          echo "table<<EOF" >> $GITHUB_OUTPUT
          printf "$TABLE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "over_budget=$OVER_BUDGET" >> $GITHUB_OUTPUT

      - name: Comment APK sizes on PR
        uses: actions/github-script@v7
        with:
          script: |
            const table = `${{ steps.sizes.outputs.table }}`;
            const overBudget = '${{ steps.sizes.outputs.over_budget }}' === 'true';
            const budget = ${{ env.APK_SIZE_BUDGET_MB }};
            const warning = overBudget
              ? `\n\n> ⚠️ **One or more APKs exceed the ${budget} MB size budget.** Please check for large assets or unnecessary dependencies.`
              : '';

            const body = `## 📦 APK Size Report\n\n${table}${warning}\n\n*Commit: \`${{ github.sha }}\`*`;

            // Delete previous size-check comment to avoid stacking
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments) {
              if (c.body.startsWith('## 📦 APK Size Report')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  # ── 3. Secret scan (prevents committing credentials) ─────────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog — scan for leaked secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified --json
        continue-on-error: true   # advisory only; won't block merge

  # ── 4. Summary ───────────────────────────────────────────────────────────────
  pr-summary:
    name: PR Check Summary
    runs-on: ubuntu-latest
    needs: [ lint-and-test, apk-size-check, secret-scan ]
    if: always()
    defaults:
      run:
        working-directory: .
    steps:
      - name: Write job summary
        run: |
          echo "## PR #${{ github.event.pull_request.number }} Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Unit Tests | ${{ needs.lint-and-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| APK Size Check | ${{ needs.apk-size-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scan | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY

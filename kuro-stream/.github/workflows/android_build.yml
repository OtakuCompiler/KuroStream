##############################################################################
# Kuro Stream — Android CI
#
# Triggered on: push to main/develop, PRs to main, manual dispatch.
#
# Jobs
# ────
#  checkout → java 17 → gradle cache → android sdk → gradlew chmod
#    → wrapper-validation → decode keystore → lint → test
#    → assembleDebug → assembleRelease (signed when secrets present)
#    → upload artifacts → job summary
#
# Artifacts uploaded
# ──────────────────
#  • lint-report                (HTML + XML, always)
#  • test-results               (HTML report, always)
#  • kuro-stream-debug-*        (4 ABI splits, always after build)
#  • kuro-stream-release-*      (4 ABI splits signed, always after build)
#  • job summary table          (APK sizes + signing status, always)
#
# Required GitHub Secrets (Settings → Secrets → Actions)
# ───────────────────────────────────────────────────────
#  KEYSTORE_BASE64   base64-encoded .jks keystore file
#                    generate: base64 -w 0 my-release-key.jks
#  STORE_PASSWORD    keystore password
#  KEY_ALIAS         key alias inside the keystore
#  KEY_PASSWORD      key password
#
# To generate a new keystore (run once locally):
#   keytool -genkeypair -v -keystore my-release-key.jks \
#     -keyalg RSA -keysize 2048 -validity 10000 \
#     -alias kuro-stream \
#     -storepass YOUR_STORE_PASS -keypass YOUR_KEY_PASS \
#     -dname "CN=Kuro Stream, OU=Mobile, O=YourOrg, L=City, S=State, C=US"
#   base64 -w 0 my-release-key.jks   # copy the output into KEYSTORE_BASE64
#
# Without secrets: debug APKs are always produced.  Release APKs are
# produced but unsigned (suitable for manual signing + sideloading).
##############################################################################

name: Kuro Stream — Android Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK splits
    runs-on: ubuntu-latest

    # ── Environment ────────────────────────────────────────────────────────────
    env:
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true -Dkotlin.incremental=false"

    steps:

      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 (Temurin LTS) ─────────────────────────────────────────────
      # Explicitly pinned to Java 17 LTS (Temurin distribution).
      # Do NOT use the default JDK that may be Java 21/25 EA on newer runners.
      # build.gradle.kts declares compileOptions { sourceCompatibility = VERSION_17 }
      # and kotlinOptions { jvmTarget = "17" }, so the JDK must match exactly.
      - name: Set up JDK 17 (Temurin LTS)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Gradle dependency cache ───────────────────────────────────────────
      # Cache ~/.gradle/caches  — downloaded JARs / POM metadata.
      # Cache ~/.gradle/wrapper — Gradle 8.9 distribution zip (≈120 MB).
      # Key includes all Gradle inputs so the cache is invalidated on any
      # dependency or wrapper version change.
      - name: Cache Gradle dependencies & wrapper
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/*.gradle', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 4. Android SDK ───────────────────────────────────────────────────────
      # ubuntu-latest ships ANDROID_HOME (/usr/local/lib/android/sdk) with
      # cmdline-tools/latest already present.  We drive sdkmanager directly
      # rather than using android-actions/setup-android@v3 which has a known
      # bug where it joins package names with commas instead of spaces, causing
      # sdkmanager to report "Failed to find package '…,…'".
      - name: Accept Android SDK licenses
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses \
            2>/dev/null || true

      - name: Install Android SDK packages
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools"    \
            "build-tools;34.0.0" \
            "platforms;android-34"
        # NDK is NOT installed — this project contains no C/C++ native code.
        # To add NDK: append  "ndk;25.1.8937393"  to the list above and set
        # android.ndkVersion in app/build.gradle.kts.

      # ── 5. Gradle wrapper ────────────────────────────────────────────────────
      # gradle-wrapper.jar is committed to the repo.
      # gradle-wrapper.properties pins Gradle 8.9-bin.
      # chmod ensures the shell script is executable on Linux runners.
      - name: Make gradlew executable
        run: chmod +x gradlew

      # Validate the wrapper JAR checksum so the build cannot be hijacked by a
      # tampered wrapper (supply-chain best practice).
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      # ── 6. Decode release keystore ───────────────────────────────────────────
      # Only runs when the KEYSTORE_BASE64 secret is present (i.e. on the main
      # repo — NOT on forked PRs where secrets are withheld by GitHub).
      # Writes the decoded .jks to $RUNNER_TEMP/keystore.jks (never inside the
      # workspace so it cannot be accidentally committed or uploaded as an
      # artifact).
      # The KEYSTORE_FILE env var tells build.gradle.kts where to find the file.
      - name: Decode release keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/keystore.jks"
          echo "Keystore written to $RUNNER_TEMP/keystore.jks"
          # Verify the file is a valid JKS / PKCS12 archive (non-zero size check)
          if [ ! -s "$RUNNER_TEMP/keystore.jks" ]; then
            echo "::error::KEYSTORE_BASE64 decoded to an empty file — check the secret value"
            exit 1
          fi

      # ── 7. Lint ──────────────────────────────────────────────────────────────
      # Run lint before compiling so style/correctness issues are surfaced first.
      # continue-on-error keeps the job alive so the APK is still produced even
      # when lint finds violations (useful during active development).
      - name: Run lint
        continue-on-error: true
        run: |
          ./gradlew lint \
            --no-daemon \
            --no-configuration-cache \
            --stacktrace

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: |
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.xml
          if-no-files-found: warn
          retention-days: 14

      # ── 7. Unit tests ────────────────────────────────────────────────────────
      # Run before building APKs — fast feedback on logic errors.
      - name: Run unit tests
        continue-on-error: true
        run: |
          ./gradlew test \
            --no-daemon \
            --no-configuration-cache \
            --stacktrace

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/
          if-no-files-found: warn
          retention-days: 14

      # ── 8. Build debug APK splits ────────────────────────────────────────────
      # Produces 4 APKs: armeabi-v7a · arm64-v8a · x86_64 · universal.
      # Per-ABI versionCode is set via androidComponents { onVariants { … } }
      # (AGP 8 stable API — versionCodeOverride was removed in AGP 8).
      - name: Build debug APKs (armeabi-v7a · arm64-v8a · x86_64 · universal)
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --no-configuration-cache \
            --stacktrace

      # ── 9. Build release APK splits ──────────────────────────────────────────
      # When KEYSTORE_BASE64 is set the APKs are fully signed (zipalign +
      # v1/v2/v3 signatures) and directly installable on Fire TV / Android TV.
      # When secrets are absent (forks, local dev) the APKs are unsigned —
      # suitable for manual signing with apksigner.
      # continue-on-error is intentional: a signing misconfiguration must never
      # prevent the debug APKs from being uploaded.
      - name: Build release APKs (armeabi-v7a · arm64-v8a · x86_64 · universal)
        continue-on-error: true
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/keystore.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --no-configuration-cache \
            --stacktrace

      # ── 10. Upload debug APK artifacts ───────────────────────────────────────
      - name: Upload debug APK — armeabi-v7a (Fire TV Stick Gen 1–2 / ARM 32-bit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kuro-stream-debug-armeabi-v7a
          path: app/build/outputs/apk/debug/*armeabi-v7a*.apk
          if-no-files-found: warn
          retention-days: 14

      - name: Upload debug APK — arm64-v8a (Fire TV 4K / ARM 64-bit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kuro-stream-debug-arm64-v8a
          path: app/build/outputs/apk/debug/*arm64-v8a*.apk
          if-no-files-found: warn
          retention-days: 14

      - name: Upload debug APK — x86_64 (emulator / Android TV box)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kuro-stream-debug-x86_64
          path: app/build/outputs/apk/debug/*x86_64*.apk
          if-no-files-found: warn
          retention-days: 14

      - name: Upload debug APK — universal (all ABIs fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kuro-stream-debug-universal
          path: app/build/outputs/apk/debug/*universal*.apk
          if-no-files-found: warn
          retention-days: 14

      # ── 11. Upload release APK artifacts ─────────────────────────────────────
      - name: Upload release APK — armeabi-v7a
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kuro-stream-release-armeabi-v7a
          path: app/build/outputs/apk/release/*armeabi-v7a*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload release APK — arm64-v8a
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kuro-stream-release-arm64-v8a
          path: app/build/outputs/apk/release/*arm64-v8a*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload release APK — x86_64
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kuro-stream-release-x86_64
          path: app/build/outputs/apk/release/*x86_64*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload release APK — universal
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kuro-stream-release-universal
          path: app/build/outputs/apk/release/*universal*.apk
          if-no-files-found: warn
          retention-days: 30

      # ── 12. Job summary ──────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        env:
          KEYSTORE_BASE64_SET: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "## Kuro Stream — Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Signing status badge
          if [ "$KEYSTORE_BASE64_SET" = "true" ]; then
            echo "🔏 **Release APKs:** signed (keystore secrets present)" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Release APKs:** unsigned (add KEYSTORE_BASE64 / STORE_PASSWORD / KEY_ALIAS / KEY_PASSWORD secrets to enable signing)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| APK | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|------|" >> $GITHUB_STEP_SUMMARY
          if find app/build/outputs/apk -name "*.apk" 2>/dev/null | grep -q .; then
            find app/build/outputs/apk -name "*.apk" 2>/dev/null | sort | while read f; do
              size=$(du -sh "$f" | cut -f1)
              echo "| $(basename "$f") | $size |" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "| _(no APKs produced)_ | — |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Java:** \`$(java -version 2>&1 | head -1)\`" >> $GITHUB_STEP_SUMMARY
          echo "**Gradle:** \`$(./gradlew --version --no-daemon 2>/dev/null | grep '^Gradle')\`" >> $GITHUB_STEP_SUMMARY
